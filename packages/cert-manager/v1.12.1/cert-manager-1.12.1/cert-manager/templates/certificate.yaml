apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: letsencrypt-crt
  namespace: default
spec:
  commonName: {{ template "baseDomain" . }} 
  dnsNames:
  - {{ template "baseDomain" . }}
  - '*.{{ template "baseDomain" . }}'
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-issuer
  secretName: zerone-tls-cert
